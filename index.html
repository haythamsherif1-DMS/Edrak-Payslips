<!DOCTYPE html>
<html dir="rtl" lang="ar" id="mainHtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edrak Professional Portal</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-blue: #004a99;
            --soft-bg: #f0f2f5;
        }

        body {
            background-color: var(--soft-bg);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 0; overflow-x: hidden;
        }

        .navbar {
            background: white;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
            padding: 12px 5%;
            position: sticky; top: 0; z-index: 1000;
        }

        /* Sidebar */
        .offcanvas { width: 300px !important; border: none; box-shadow: 5px 0 20px rgba(0,0,0,0.1); }
        .sidebar-header { background: var(--primary-blue); color: white; padding: 30px 20px; }
        .nav-link-sidebar {
            padding: 18px 25px; color: #444; text-decoration: none;
            display: flex; align-items: center; gap: 15px;
            border-bottom: 1px solid #f0f0f0; transition: 0.3s; font-weight: 500;
        }
        .nav-link-sidebar:hover { background: #f0f7ff; color: var(--primary-blue); }

        /* Hero Section - تصميم 3D مميز */
        .hero-container {
            height: calc(100vh - 80px);
            display: flex; align-items: center; justify-content: center;
            perspective: 1000px; /* لإعطاء عمق 3D */
            background: #ffffff;
            padding: 20px;
        }
        
        .image-wrapper {
            width: 100%;
            max-width: 900px;
            transform: rotateX(5deg) rotateY(-5deg); /* ميلان بسيط لإيحاء 3D */
            transition: all 0.5s ease;
        }

        .image-wrapper:hover {
            transform: rotateX(0deg) rotateY(0deg) scale(1.02); /* العودة للأصل عند التمرير */
        }

        .main-hero-img {
            width: 100%;
            height: auto;
            border-radius: 30px;
            /* ظل عميق يعطي إيحاء بأن الصورة طافية 3D */
            box-shadow: 30px 30px 60px rgba(0,0,0,0.2), 
                        -10px -10px 30px rgba(255,255,255,0.5);
            border: 8px solid white;
        }

        /* Modal & Back Button */
        .modal-full { max-width: 100%; margin: 0; height: 100%; }
        .modal-content { height: 100vh; border: none; border-radius: 0; overflow: hidden; position: relative; }
        
        .back-nav-bar {
            background: white; padding: 12px 25px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 2px solid #eee; z-index: 1100;
        }

        .btn-back-style {
            background: var(--primary-blue); color: white; border: none;
            padding: 8px 25px; border-radius: 50px; font-weight: bold;
            display: flex; align-items: center; gap: 10px; cursor: pointer;
        }

        /* Loader Animation */
        #globalLoader {
            position: absolute;
            top: 65px; left: 0; right: 0; bottom: 0;
            background: #ffffff;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 1200;
        }
        .loader-visual { width: 80px; height: 80px; position: relative; margin-bottom: 20px; }
        .pulse-ring {
            position: absolute; width: 100%; height: 100%;
            border: 4px solid var(--primary-blue); border-radius: 50%;
            animation: pulse-animation 1.5s infinite;
        }
        @keyframes pulse-animation {
            0% { transform: scale(0.1); opacity: 1; }
            100% { transform: scale(1.2); opacity: 0; }
        }
        .loader-icon {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: var(--primary-blue); font-size: 2rem; animation: bounceIn 1s infinite alternate;
        }

        iframe { width: 100%; height: calc(100vh - 65px); border: none; display: block; }
        .lang-toggle { cursor: pointer; padding: 6px 18px; border: 2px solid var(--primary-blue); border-radius: 25px; color: var(--primary-blue); font-weight: bold; }
    </style>
</head>
<body>

<nav class="navbar d-flex justify-content-between align-items-center">
    <div class="d-flex align-items-center gap-3">
        <button class="btn p-0 border-0" data-bs-toggle="offcanvas" data-bs-target="#sidebarMenu">
            <i class="fas fa-bars fa-2x text-primary"></i>
        </button>
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS_bxPxMDdkYISQbRLcmYnEpiKs0-44MqXMyg&s" height="45" alt="Logo">
    </div>
    <div class="lang-toggle" onclick="toggleLanguage()" id="langBtn">EN</div>
</nav>

<div class="offcanvas offcanvas-start" id="sidebarMenu">
    <div class="sidebar-header">
        <h4 id="sideTitle">نظام إدراك</h4>
        <p class="small mb-0 opacity-75">Edrak Professional Portal</p>
    </div>
    <div class="offcanvas-body p-0">
        <a href="#" onclick="openInApp('https://script.google.com/macros/s/AKfycbztP1ilB78dgkDAv3RE0_TOr_ShvXff23c2PKljm7-O5z1ORVlndU2i8UmpekovIKbK/exec', 'Employee Data')" class="nav-link-sidebar">
            <i class="fas fa-users-cog"></i> <span class="txt-db">بيانات الموظفين</span>
        </a>
        <a href="#" onclick="openInApp('https://script.google.com/macros/s/AKfycbyamFoOoj0GAZ--yHlYNvdxCtS59s8FFPfftvb4N0m4qARNMChMLKgDN7fs9jyjGtsC/exec', 'Payroll')" class="nav-link-sidebar">
            <i class="fas fa-file-invoice-dollar"></i> <span class="txt-payroll">مفردات المرتب</span>
        </a>
        <a href="#" onclick="openInApp('https://script.google.com/macros/s/AKfycbzDqqrb5-dNIlEfAU7uZeZ2-aXbR9E15z2MK3K2S7woytuOsu2WCUpHpaJ9GJdFWZ0/exec', 'Vacations')" class="nav-link-sidebar">
            <i class="fas fa-calendar-alt"></i> <span class="txt-vacation">الإجازات والأذونات</span>
        </a>
        <a href="#" onclick="openInApp('https://script.google.com/macros/s/AKfycbxGF_-V8PU6BIYyBZIq8Ysi8FqnvSToEAgVqrL5z2EjOMQi8tH06i5fCCn0kh5hPsTo/exec?page=user', 'Notifications')" class="nav-link-sidebar">
            <i class="fas fa-bell"></i> <span class="txt-notif">الإشعارات الحديثة</span>
        </a>
        <a href="#" onclick="openInApp('https://script.google.com/macros/s/AKfycbwlxTldi-h9GyNuQY1d2ev45XxTniaJgq_7aM9CuAP3g_qtUMlhppq98E44tpZOGMU/exec', 'Contact')" class="nav-link-sidebar">
            <i class="fas fa-comments"></i> <span class="txt-contact">تواصل معنا</span>
        </a>
    </div>
</div>

<div class="hero-container">
    <div class="image-wrapper animate__animated animate__zoomIn">
        <img src="https://d1eilicilqktnj.cloudfront.net/highlighted_contents/primary_images/449/default/400X205-Size-03.jpeg?1588280340" class="main-hero-img" alt="KidZania Cairo">
    </div>
</div>

<div class="modal fade" id="appModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
    <div class="modal-dialog modal-full">
        <div class="modal-content">
            <div class="back-nav-bar">
                <span class="fw-bold text-primary" id="modalTitleDisplay">Edrak System</span>
                <button type="button" class="btn-back-style" data-bs-dismiss="modal">
                    <span id="backTxt">رجوع</span> <i class="fas fa-chevron-left" id="backIcon"></i>
                </button>
            </div>
            <div class="modal-body p-0 position-relative">
                <div id="globalLoader">
                    <div class="loader-visual">
                        <div class="pulse-ring"></div>
                        <i class="fas fa-sync-alt loader-icon"></i>
                    </div>
                    <h5 id="loadingTxt" class="text-primary fw-bold">جاري تحميل الصفحة...</h5>
                </div>
                <iframe src="" id="appIframe"></iframe>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let currentLang = 'ar';
    const modal = new bootstrap.Modal(document.getElementById('appModal'));
    const iframe = document.getElementById('appIframe');
    const loader = document.getElementById('globalLoader');

    function openInApp(url, title) {
        document.getElementById('modalTitleDisplay').innerText = title;
        loader.style.display = 'flex';
        iframe.style.visibility = 'hidden';
        iframe.src = "about:blank";
        
        const cacheBuster = "t=" + new Date().getTime();
        const separator = url.includes('?') ? '&' : '?';
        iframe.src = url + separator + 'authuser=0&' + cacheBuster;
        
        modal.show();
        const offcanvas = bootstrap.Offcanvas.getInstance(document.getElementById('sidebarMenu'));
        if(offcanvas) offcanvas.hide();
    }

    iframe.onload = function() {
        if (iframe.src !== "about:blank") {
            setTimeout(() => {
                loader.style.display = 'none';
                iframe.style.visibility = 'visible';
            }, 800);
        }
    };

    function toggleLanguage() {
        currentLang = currentLang === 'ar' ? 'en' : 'ar';
        const html = document.getElementById('mainHtml');
        if(currentLang === 'en') {
            html.dir = 'ltr'; html.lang = 'en';
            document.getElementById('langBtn').innerText = 'AR';
            updateTexts('en');
        } else {
            html.dir = 'rtl'; html.lang = 'ar';
            document.getElementById('langBtn').innerText = 'EN';
            updateTexts('ar');
        }
    }

    function updateTexts(l) {
        const translations = {
            ar: { db: "بيانات الموظفين", pay: "مفردات المرتب", vac: "الإجازات والأذونات", notif: "الإشعارات الحديثة", contact: "تواصل معنا", back: "رجوع", side: "نظام إدراك", load: "جاري تحميل الصفحة..." },
            en: { db: "Employee Data", pay: "Payroll Report", vac: "Vacations", notif: "Recent Notifications", contact: "Contact Us", back: "Back", side: "Edrak System", load: "Loading Page..." }
        };
        document.querySelector('.txt-db').innerText = translations[l].db;
        document.querySelector('.txt-payroll').innerText = translations[l].pay;
        document.querySelector('.txt-vacation').innerText = translations[l].vac;
        document.querySelector('.txt-notif').innerText = translations[l].notif;
        document.querySelector('.txt-contact').innerText = translations[l].contact;
        document.getElementById('backTxt').innerText = translations[l].back;
        document.getElementById('sideTitle').innerText = translations[l].side;
        document.getElementById('loadingTxt').innerText = translations[l].load;
        document.getElementById('backIcon').className = l === 'ar' ? 'fas fa-chevron-left' : 'fas fa-chevron-right';
    }
</script>
</body>
</html>
