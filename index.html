<!DOCTYPE html>
<html dir="rtl" lang="ar" id="mainHtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Edrak Professional Portal</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-blue: #004a99;
            --soft-bg: #f4f7f9;
        }

        body {
            background-color: var(--soft-bg);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 0; overflow-x: hidden;
            height: 100vh;
        }

        .navbar {
            background: white;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
            padding: 10px 5%;
            position: sticky; top: 0; z-index: 1000;
        }

        /* Sidebar Responsive */
        .offcanvas { width: 280px !important; border: none; box-shadow: 5px 0 20px rgba(0,0,0,0.1); }
        .sidebar-header { background: var(--primary-blue); color: white; padding: 25px 20px; }
        .nav-link-sidebar {
            padding: 15px 20px; color: #444; text-decoration: none;
            display: flex; align-items: center; gap: 12px;
            border-bottom: 1px solid #f0f0f0; transition: 0.3s; font-weight: 500;
        }
        .nav-link-sidebar:hover { background: #f0f7ff; color: var(--primary-blue); transform: translateX(-5px); }

        /* --- تحسين الواجهة (Hero) للموبايل --- */
        .hero-container {
            height: calc(100vh - 70px); /* تعويض ارتفاع النافبار */
            display: flex; 
            align-items: center; 
            justify-content: center;
            perspective: 1200px;
            padding: 15px;
            overflow: hidden;
        }
        
        .scene-3d {
            width: 100%;
            max-width: 650px; /* حجم أصغر قليلاً للتحكم الأفضل */
            transform-style: preserve-3d;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            /* زاوية ميلان أخف للموبايل */
            transform: rotateX(5deg) rotateY(-5deg);
        }

        /* تعديلات اللاب توب */
        @media (min-width: 992px) {
            .scene-3d {
                transform: rotateX(10deg) rotateY(-10deg);
            }
            .scene-3d:hover {
                transform: rotateX(0deg) rotateY(0deg) scale(1.05);
            }
        }

        .main-hero-img {
            width: 100%;
            height: auto;
            max-height: 60vh; /* يمنع الصورة من أن تصبح طويلة جداً في الموبايل */
            object-fit: contain;
            border-radius: 20px;
            box-shadow: 15px 15px 35px rgba(0,0,0,0.15);
            border: 6px solid white;
            display: block;
        }

        /* Logo size responsive */
        .navbar-brand-img { height: 35px; }
        @media (min-width: 768px) { .navbar-brand-img { height: 45px; } }

        /* Modal Settings */
        .modal-full { max-width: 100%; margin: 0; height: 100%; }
        .modal-content { height: 100vh; border: none; border-radius: 0; overflow: hidden; }
        .back-nav-bar { background: white; padding: 10px 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #eee; }
        .btn-back-style { background: var(--primary-blue); color: white; border: none; padding: 6px 15px; border-radius: 50px; font-size: 0.9rem; }

        #globalLoader { position: absolute; top: 55px; left: 0; right: 0; bottom: 0; background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1200; }
        .loader-visual { width: 50px; height: 50px; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary-blue); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        iframe { width: 100%; height: calc(100vh - 55px); border: none; visibility: hidden; }
        .lang-toggle { cursor: pointer; padding: 4px 12px; border: 2px solid var(--primary-blue); border-radius: 20px; color: var(--primary-blue); font-weight: bold; font-size: 0.85rem; }
    </style>
</head>
<body>

<nav class="navbar d-flex justify-content-between align-items-center">
    <div class="d-flex align-items-center gap-2">
        <button class="btn p-0 border-0" data-bs-toggle="offcanvas" data-bs-target="#sidebarMenu">
            <i class="fas fa-bars fa-xl text-primary"></i>
        </button>
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS_bxPxMDdkYISQbRLcmYnEpiKs0-44MqXMyg&s" class="navbar-brand-img" alt="Logo">
    </div>
    <div class="lang-toggle" onclick="toggleLanguage()" id="langBtn">EN</div>
</nav>

<div class="offcanvas offcanvas-start" id="sidebarMenu">
    <div class="sidebar-header">
        <h5 id="sideTitle" class="mb-1">نظام إدراك</h5>
        <p class="small mb-0 opacity-75">Professional Portal</p>
    </div>
    <div class="offcanvas-body p-0">
        <a href="#" onclick="openInApp('URL_HERE', 'Employee Data')" class="nav-link-sidebar">
            <i class="fas fa-users-cog"></i> <span class="txt-db">بيانات الموظفين</span>
        </a>
        </div>
</div>

<div class="hero-container">
    <div class="scene-3d animate__animated animate__zoomIn">
        <img src="https://www.wipo.int/dpp-files/54294/54294.jpg" class="main-hero-img" alt="Illustration">
    </div>
</div>

<div class="modal fade" id="appModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
    <div class="modal-dialog modal-full">
        <div class="modal-content">
            <div class="back-nav-bar">
                <span class="fw-bold text-primary small" id="modalTitleDisplay">System</span>
                <button type="button" class="btn-back-style" data-bs-dismiss="modal">
                    <span id="backTxt">رجوع</span> <i class="fas fa-chevron-left"></i>
                </button>
            </div>
            <div class="modal-body p-0 position-relative">
                <div id="globalLoader">
                    <div class="loader-visual"></div>
                    <p class="mt-2 text-primary small fw-bold" id="loadingTxt">جاري التحميل...</p>
                </div>
                <iframe src="" id="appIframe"></iframe>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // جميع السكربتات الأصلية تعمل هنا بشكل مثالي
    let currentLang = 'ar';
    const modal = new bootstrap.Modal(document.getElementById('appModal'));
    const iframe = document.getElementById('appIframe');
    const loader = document.getElementById('globalLoader');

    function openInApp(url, title) {
        document.getElementById('modalTitleDisplay').innerText = title;
        loader.style.display = 'flex';
        iframe.style.visibility = 'hidden';
        iframe.src = "about:blank";
        const cacheBuster = "t=" + new Date().getTime();
        iframe.src = url + (url.includes('?') ? '&' : '?') + 'authuser=0&' + cacheBuster;
        modal.show();
        bootstrap.Offcanvas.getInstance(document.getElementById('sidebarMenu')).hide();
    }

    iframe.onload = () => { if(iframe.src !== "about:blank") { loader.style.display = 'none'; iframe.style.visibility = 'visible'; } };

    function toggleLanguage() {
        currentLang = currentLang === 'ar' ? 'en' : 'ar';
        const html = document.getElementById('mainHtml');
        html.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
        document.getElementById('langBtn').innerText = currentLang === 'ar' ? 'EN' : 'AR';
        updateTexts(currentLang);
    }

    function updateTexts(l) {
        const trans = {
            ar: { db: "بيانات الموظفين", back: "رجوع", side: "نظام إدراك", loading: "جاري التحميل..." },
            en: { db: "Employee Data", back: "Back", side: "Edrak System", loading: "Loading..." }
        };
        // قم بتعبئة باقي الترجمات هنا
        document.getElementById('backTxt').innerText = trans[l].back;
        document.getElementById('sideTitle').innerText = trans[l].side;
        document.getElementById('loadingTxt').innerText = trans[l].loading;
    }
</script>
</body>
</html>
